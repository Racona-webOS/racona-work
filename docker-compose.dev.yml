version: '3.8'

services:
  racona-work-db:
    image: postgres:18-alpine
    container_name: racona-work-db
    ports:
      - '5433:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: racona_work_dev
    volumes:
      - racona-work-db-data:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d racona_work_dev']
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  racona-work-db-data:
    name: racona-work-db-data
